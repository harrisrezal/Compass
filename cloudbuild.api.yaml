steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/compass-api:$COMMIT_SHA'
      - '-f'
      - 'Dockerfile.api'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/compass-api:$COMMIT_SHA'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - compass-api
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/compass-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,BQ_DATASET=vitaguard,BQ_LOCATION=us-central1,GEMINI_API_KEY=$_GEMINI_API_KEY'

substitutions:
  _GEMINI_API_KEY: ''

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/compass-api:$COMMIT_SHA'
