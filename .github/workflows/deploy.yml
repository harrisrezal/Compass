name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy FastAPI Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy compass-api \
            --source . \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},BQ_DATASET=vitaguard,BQ_LOCATION=us-central1,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --project ${{ secrets.GCP_PROJECT_ID }}

  deploy-frontend:
    name: Deploy Next.js Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy compass-frontend \
            --source frontend/caregiver-app \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-build-env-vars "NEXT_PUBLIC_API_URL=${{ secrets.BACKEND_URL }}" \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --project ${{ secrets.GCP_PROJECT_ID }}
